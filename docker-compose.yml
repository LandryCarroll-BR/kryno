services:
  postgres:
    image: postgres:17-alpine
    container_name: kryno-postgres
    environment:
      POSTGRES_DB: kryno
      POSTGRES_USER: kryno_admin
      POSTGRES_PASSWORD: kryno_admin
    ports:
      - "5432:5432"
    volumes:
      - kryno-postgres-data:/var/lib/postgresql/data
      - ./modules/auth/infrastructure/bootstrap.sql:/docker-entrypoint-initdb.d/010-create-auth-role.sql:ro
      - ./modules/climbing/infrastructure/bootstrap.sql:/docker-entrypoint-initdb.d/020-create-climbing-role.sql:ro
      - ./modules/gym/infrastructure/bootstrap.sql:/docker-entrypoint-initdb.d/030-create-gym-role.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kryno_admin -d kryno"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  kryno-postgres-data:
